<!DOCTYPE html>
<html>
    <head>
        <link href="https://fonts.googleapis.com/css2?family=Gaegu&family=Gorditas:wght@400;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
        <style>
            html {
                background-color: blue;
                background-image: linear-gradient(to bottom, #26303B, #1E1E1E), url("https://www.freeiconspng.com/thumbs/grid-png/tile-grid-png-6.png");
                background-repeat: no-repeat;
                background-attachment: fixed;
            }
            h1 {
                color: white;
                text-align: center;
                font-family: Inter;
                font-size: 50px;
                padding-bottom: 25px;
                border-bottom: 5px solid #ffffff;
            }
            p {
                font-size: 20px;
                text-align: center;
            }
        </style>
        <title>Steam Value Comparator Grapher</title>
        <h1>Steam Value Comparison Grapher</h1>
    </head>
    <body>
        <form id="UsersNum" action="/submit" method="POST">
            <label for="UsersNum">How many users?</label>
            <input id="UsersNum" type="number" name="UsersNum" min="1" required>
            <button type="submit">Submit</button>
        </form>
        <h3>What does it do?</h3>
        <p>This tool is for comparing Steam accounts and their game libraries. It was mainly made for Steam family, seeing which member contributed most in the family, but it can also be used to compare with the Steam accounts of random people or with friends</p>
    </body>
</html>
