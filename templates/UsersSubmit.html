<!DOCTYPE html>
<html>
    <script
    src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.9.4/Chart.js">
    </script>
    <head>
        <title>Steam Value Comparator Grapher</title>
    </head>
    <body>
        <canvas id="myChart" style="width:100%;max-width:600px"></canvas>
        <script>
        var xValues = {{usernames_list | tojson}};
        var yValues = {{total_games_list | tojson}};
        var barColors = [
        "#b91d47",
        "#00aba9",
        "#2b5797",
        "#e8c3b9",
        "#1e7145"
        ];

        new Chart("myChart", {
        type: "pie",
        data: {
            labels: xValues,
            datasets: [{
            backgroundColor: barColors,
            data: yValues
            }]
        },
        options: {
            title: {
            display: true,
            text: "Comparison of Number of Games"
            }
        }
        });
        </script>
    <head>
        <title>Steam Value Comparator Grapher</title>
    </head>
    <body>
    </body>
</html>
